sonar.projectKey=campaign-manager-v2
sonar.projectName=Campaign Manager V2
sonar.projectVersion=1.0

# Path to source directories
sonar.sources=app,components,utils,types,cm-backend/src
sonar.tests=app
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts

# Language specific settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions
sonar.exclusions=node_modules/**,.next/**,public/**,dist/**,cm-backend/node_modules/**,cm-backend/dist/**
sonar.coverage.exclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts,app/api/**

# Encoding
sonar.sourceEncoding=UTF-8
